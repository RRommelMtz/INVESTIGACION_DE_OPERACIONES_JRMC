<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Método Newton-Raphson</title>

<script src="https://cdn.jsdelivr.net/npm/mathjs@11/lib/browser/math.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    margin:0;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:#111827;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    color:#38bdf8;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#38bdf8;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0ea5e9;
}

.resultado{
    margin-top:20px;
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    overflow-x:auto;
}

.final{
    margin-top:20px;
    padding:20px;
    border-radius:10px;
    background:#16a34a;
    font-size:24px;
    font-weight:bold;
    text-align:center;
}

.error{
    background:#dc2626;
}

canvas{
    background:white;
    border-radius:10px;
    margin-top:20px;
}

.formula{
    text-align:center;
    background:#0f172a;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:24px;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="container">

<h1>Método de Newton-Raphson</h1>

<div class="formula">
x(k+1) = x(k) - f'(x) / f''(x)
</div>

<div class="input-group">
<label>Tipo de optimización</label>
<select id="tipo">
    <option value="min">Minimizar</option>
    <option value="max">Maximizar</option>
</select>
</div>

<div class="input-group">
<label>Función f(x)</label>
<input type="text" id="funcion" placeholder="Ejemplo: x^4 - 3*x^2 + 2">
</div>

<div class="input-group">
<label>Valor inicial X₀</label>
<input type="number" id="x0" value="1">
</div>

<div class="input-group">
<label>Tolerancia</label>
<input type="number" id="tol" value="0.0001" step="0.0001">
</div>

<div class="input-group">
<label>Máximo de iteraciones</label>
<input type="number" id="maxIter" value="50">
</div>

<button onclick="resolver()">
Resolver
</button>

<div class="resultado" id="resultado"></div>

<canvas id="grafica"></canvas>

</div>

<script>

let chart;

function resolver(){

    const tipo = document.getElementById("tipo").value;

    const funcionTexto = document.getElementById("funcion").value;

    const xInicial = parseFloat(document.getElementById("x0").value);

    const tol = parseFloat(document.getElementById("tol").value);

    const maxIter = parseInt(document.getElementById("maxIter").value);

    const resultadoDiv = document.getElementById("resultado");

    try{

        const f = math.compile(funcionTexto);

        const derivada1 = math.derivative(funcionTexto,'x');

        const derivada2 = math.derivative(derivada1,'x');

        let x = xInicial;

        let error = 100;

        let iter = 0;

        let tabla = `
        <h2 style="text-align:center; color:#38bdf8;">
        Tabla de Iteraciones
        </h2>

        <table style="
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
        font-size:18px;
        background:white;
        ">

        <tr style="height:70px;">

            <th style="
            background:#ffffff;
            color:black;
            border:3px solid black;
            font-size:35px;
            ">
            i
            </th>

            <th style="
            background:#f3f3f3;
            color:#7e3af2;
            border:3px solid black;
            font-size:35px;
            ">
            X₁
            </th>

            <th style="
            background:#f3f3f3;
            color:#22c55e;
            border:3px solid black;
            font-size:35px;
            ">
            X₀
            </th>

            <th style="
            background:#f3f3f3;
            color:#4338ca;
            border:3px solid black;
            font-size:35px;
            ">
            f'(xᵢ)
            </th>

            <th style="
            background:#f3f3f3;
            color:#f59e0b;
            border:3px solid black;
            font-size:35px;
            ">
            f''(xᵢ)
            </th>

            <th style="
            background:#f3f3f3;
            color:#ec4899;
            border:3px solid black;
            font-size:35px;
            ">
            X₂
            </th>

            <th style="
            background:#f3f3f3;
            color:red;
            border:3px solid black;
            font-size:22px;
            ">
            Error %
            <br>
            |X₂ - X₁| / |X₂| *100
            </th>

        </tr>
        `;

        while(error > tol && iter < maxIter){

            let xAnterior = x;

            let fp = derivada1.evaluate({x:x});

            let fpp = derivada2.evaluate({x:x});

            if(fpp == 0){

                alert("La segunda derivada es cero.");

                return;
            }

            let xnuevo = x - (fp/fpp);

            error = Math.abs(xnuevo - x);

            let errorPorcentaje =
            (error / Math.abs(xnuevo)) * 100;

            tabla += `
            <tr style="
            height:55px;
            color:black;
            text-align:center;
            ">

                <td style="border:2px solid black;">
                    ${iter+1}
                </td>

                <td style="border:2px solid black;">
                    ${xAnterior.toFixed(6)}
                </td>

                <td style="border:2px solid black;">
                    ${x.toFixed(6)}
                </td>

                <td style="border:2px solid black;">
                    ${fp.toFixed(6)}
                </td>

                <td style="border:2px solid black;">
                    ${fpp.toFixed(6)}
                </td>

                <td style="
                border:2px solid black;
                font-weight:bold;
                color:#ec4899;
                ">
                    ${xnuevo.toFixed(6)}
                </td>

                <td style="
                border:2px solid black;
                color:red;
                font-weight:bold;
                ">
                    ${errorPorcentaje.toFixed(4)} %
                </td>

            </tr>
            `;

            x = xnuevo;

            iter++;
        }

        tabla += `</table>`;

        let segunda = derivada2.evaluate({x:x});

        let tipoEncontrado = "";

        if(segunda > 0){

            tipoEncontrado = "MÍNIMO";

        }else{

            tipoEncontrado = "MÁXIMO";
        }

        let valido = false;

        if(tipo == "min" && segunda > 0){

            valido = true;
        }

        if(tipo == "max" && segunda < 0){

            valido = true;
        }

        let fx = f.evaluate({x:x});

        if(valido){

            resultadoDiv.innerHTML = `

            <h2 style="color:#38bdf8;">
            Derivadas
            </h2>

            <p>
            <strong>f'(x):</strong>
            ${derivada1}
            </p>

            <p>
            <strong>f''(x):</strong>
            ${derivada2}
            </p>

            ${tabla}

            <div class="final">

                ${tipoEncontrado} encontrado

                <br><br>

                x = ${x.toFixed(6)}

                <br><br>

                f(x) = ${fx.toFixed(6)}

            </div>
            `;

        }else{

            resultadoDiv.innerHTML = `

            <h2 style="color:#38bdf8;">
            Derivadas
            </h2>

            <p>
            <strong>f'(x):</strong>
            ${derivada1}
            </p>

            <p>
            <strong>f''(x):</strong>
            ${derivada2}
            </p>

            ${tabla}

            <div class="final error">

                El punto encontrado es un

                ${tipoEncontrado}

                <br><br>

                No coincide con el tipo seleccionado

            </div>
            `;
        }

        graficar(f, x);

    }catch(error){

        resultadoDiv.innerHTML = `
        <div class="final error">

            Error en la función

        </div>
        `;
    }
}

function graficar(f, puntoOptimo){

    const xs = [];

    const ys = [];

    for(let x=-10; x<=10; x+=0.1){

        xs.push(x);

        try{

            ys.push(f.evaluate({x:x}));

        }catch{

            ys.push(null);
        }
    }

    const yOptimo = f.evaluate({x:puntoOptimo});

    const ctx =
    document.getElementById('grafica');

    if(chart){

        chart.destroy();
    }

    chart = new Chart(ctx,{

        type:'line',

        data:{

            labels:xs,

            datasets:[

                {
                    label:'f(x)',
                    data:ys,
                    borderWidth:3,
                    fill:false
                },

                {
                    label:'Óptimo',
                    data:xs.map(v =>
                    Math.abs(v-puntoOptimo)<0.05
                    ? yOptimo : null),

                    pointRadius:8,
                    showLine:false
                }

            ]
        },

        options:{

            responsive:true,

            scales:{

                x:{
                    title:{
                        display:true,
                        text:'x'
                    }
                },

                y:{
                    title:{
                        display:true,
                        text:'f(x)'
                    }
                }
            }
        }
    });
}

</script>

</body>
</html>
